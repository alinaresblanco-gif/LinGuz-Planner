<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Nuestras Recetas Familiares</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px 16px 28px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        header h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 10px 22px;
            background: rgba(255,255,255,0.25);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            backdrop-filter: blur(4px);
        }
        .btn-back:hover { background: rgba(255,255,255,0.4); transform: scale(1.04); }
        header { background: linear-gradient(135deg, #ff7043, #ffa726); }
    </style>
</head>
<body>
    <header>
        <h1>🍽️ NUESTRAS RECETAS FAMILIARES</h1>
        <a class="btn-back" href="../index.html">🏠 Volver al inicio</a>
    </header>
</body>
</html>

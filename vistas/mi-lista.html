<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Mi Lista de la Compra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px 16px 28px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        header h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 10px 22px;
            background: rgba(255,255,255,0.25);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            backdrop-filter: blur(4px);
        }
        .btn-back:hover { background: rgba(255,255,255,0.4); transform: scale(1.04); }
        .app {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px 14px 20px;
        }
        .toolbar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .row-full {
            display: flex;
            width: 100%;
        }
        .user-line {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 8px;
            align-items: center;
            width: 100%;
        }
        .product-line {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            width: 100%;
        }
        .product-line select {
            min-width: 125px;
        }
        .add-line {
            display: grid;
            grid-template-columns: 65% 35%;
            gap: 8px;
            width: 100%;
        }
        .add-line select,
        .add-line button {
            width: 100%;
        }
        .user-line label {
            margin-right: 2px;
        }
        .user-line select {
            width: 100%;
            min-width: 0;
        }
        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #2e5b4a;
        }
        select,
        input,
        button {
            font-family: 'Nunito', sans-serif;
        }
        select,
        input {
            border: 1px solid #b7d6c1;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.92rem;
            background: #fff;
            color: #1f3d32;
        }
        .input-product {
            flex: 1;
            min-width: 150px;
        }
        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
            color: #fff;
        }
        .btn-full {
            width: 100%;
            min-height: 42px;
        }
        .btn-primary { background: linear-gradient(135deg, #34a853, #2f80ed); }
        .btn-secondary { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .btn-danger { background: linear-gradient(135deg, #ef5350, #e53935); }
        .btn-icon {
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 12px;
            font-size: 1.22rem;
            line-height: 1;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #26a69a, #00897b);
        }
        .btn-ghost {
            color: #1f3d32;
            border: 1px solid #b7d6c1;
            background: #fff;
            padding: 7px 9px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
        }
        .clear-btn-wrap {
            display: flex;
            justify-content: center;
            margin-top: -4px;
        }
        .btn-clear-list {
            width: min(560px, 95%);
            padding: 12px 14px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border: 0;
            color: #fff;
            font-size: 0.87rem;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, #f44336, #d32f2f);
            box-shadow: 0 8px 18px rgba(211, 47, 47, 0.28);
        }
        .lists {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .list-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.07);
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .list-header h2 {
            font-size: 1rem;
            color: #1f3d32;
            font-weight: 800;
        }
        .pill {
            font-size: 0.72rem;
            font-weight: 800;
            color: #fff;
            border-radius: 999px;
            padding: 4px 9px;
        }
        .pill.private { background: #43a047; }
        .pill.common { background: #1e88e5; }
        .group-title {
            margin-top: 10px;
            margin-bottom: 6px;
            font-size: 0.82rem;
            color: #49685b;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .items {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            background: #f8fbf9;
            border: 1px solid #d9e9df;
            border-radius: 10px;
            padding: 8px;
        }
        .item-name {
            font-size: 0.94rem;
            color: #203a31;
            font-weight: 700;
        }
        .item-meta {
            font-size: 0.76rem;
            color: #5f7a70;
            margin-top: 2px;
        }
        .item-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }
        .check-wrap {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #2a4a3d;
            background: #fff;
            border: 1px solid #b7d6c1;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
        }
        .check-wrap input {
            width: 15px;
            height: 15px;
            accent-color: #2f80ed;
            cursor: pointer;
        }
        .check-wrap.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .item.is-bought .item-name {
            text-decoration: line-through;
            opacity: 0.62;
        }
        .muted {
            font-size: 0.82rem;
            color: #607d73;
            text-align: center;
            padding: 8px 0;
        }
        .lists {
            margin-top: 4px;
        }
        @media (min-width: 900px) {
            .lists { grid-template-columns: 1fr 1fr; }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 20px;
            padding: 24px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1f3d32;
            margin-bottom: 12px;
        }
        .modal-description {
            font-size: 0.95rem;
            color: #5f7a70;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal-form input {
            border: 1px solid #b7d6c1;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 0.96rem;
            font-family: 'Nunito', sans-serif;
            background: #fff;
            color: #1f3d32;
        }
        .modal-form input::placeholder {
            color: #9db5aa;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 11px 12px;
            border-radius: 10px;
            border: 0;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            color: #fff;
        }
        .modal-btn-create {
            background: linear-gradient(135deg, #34a853, #2f80ed);
        }
        .modal-btn-cancel {
            background: #ccc;
            color: #333;
        }
        header { background: linear-gradient(135deg, #66bb6a, #42a5f5); }
    </style>
</head>
<body>
    <header>
        <h1>🛒 MI LISTA DE LA COMPRA</h1>
        <a class="btn-back" href="../index.html">🏠 Volver al inicio</a>
    </header>
    <main class="app">
        <section class="toolbar panel">
            <div class="user-line">
                <label for="userSelect">Usuario activo:</label>
                <select id="userSelect" aria-label="Seleccionar usuario"></select>
                <button id="btnAddUser" class="btn btn-icon" type="button" aria-label="Añadir usuario" title="Añadir usuario">+</button>
            </div>
            <div class="row-full">
                <button id="btnSuper" class="btn btn-secondary btn-full" type="button">Modo Supermercado: OFF</button>
            </div>
            <div class="product-line">
                <input id="inputProduct" class="input-product" type="text" placeholder="Añadir producto (ej: Leche)" aria-label="Nombre del producto">
                <select id="inputCategory" aria-label="Categoría del producto"></select>
            </div>
            <div class="add-line">
                <select id="inputTarget" aria-label="Destino del producto">
                    <option value="private">Lista personal</option>
                    <option value="common">Lista común</option>
                </select>
                <button id="btnAdd" class="btn btn-primary" type="button">Añadir</button>
            </div>
            <div class="row-full">
                <button id="btnVoice" class="btn btn-primary btn-full" type="button">Añadir un Producto por Voz</button>
            </div>
        </section>

        <div class="clear-btn-wrap">
            <button id="btnClear" class="btn-clear-list" type="button">LIMPIAR LISTA DE LA COMPRA</button>
        </div>

        <section class="lists">
            <article class="list-card">
                <div class="list-header">
                    <h2 id="privateTitle">Lista personal</h2>
                    <span class="pill private">PRIVADA</span>
                </div>
                <div id="privateList"></div>
            </article>

            <article class="list-card">
                <div class="list-header">
                    <h2>Lista común de la casa</h2>
                    <span class="pill common">COMÚN</span>
                </div>
                <div id="commonList"></div>
            </article>
        </section>
    </main>

    <div id="modalCreateUser" class="modal">
        <div class="modal-content">
            <div class="modal-title">Crear tu usuario</div>
            <div class="modal-description">Ingresa tu nombre para crear tu usuario y acceder a tu lista privada.</div>
            <div class="modal-form">
                <input id="modalUserName" type="text" placeholder="Tu nombre (ej: Mamá)" aria-label="Nombre del usuario">
                <input id="modalUserEmail" type="email" placeholder="Email (opcional)" aria-label="Email del usuario">
                <input id="modalUserPin" type="password" placeholder="PIN (6 dígitos)" aria-label="PIN para acceso rápido">
            </div>
            <div class="modal-buttons">
                <button id="modalBtnCreate" class="modal-btn-create" type="button">Crear Usuario</button>
                <button id="modalBtnCancel" class="modal-btn-cancel" type="button">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        const CATEGORIES = [
            "Frutería",
            "Verdulería",
            "Carnicería",
            "Pescadería",
            "Lácteos",
            "Legumbres",
            "Cereales y Harinas",
            "Cafés e infusiones",
            "Panadería",
            "Despensa",
            "Congelados",
            "Bebidas",
            "Snack",
            "Limpieza",
            "Higiene",
            "Otros"
        ];

        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlmU7HRyG7Vjha-N57gZFYrxkUi3GzeT5jrG_ZWuJp6iQHjHMdhpJtzhYHjk1Qw8ZpQQ/exec";
        const SHEET_USUARIOS_URL = "https://docs.google.com/spreadsheets/d/1nOrbd3WlowaE3dk8n-WIqTobyTbITdYjCB4pyC2muAY/edit#gid=55433294";
        const DEFAULT_HOGAR_ID = "hogar-001";
        const STORAGE_USER_KEY = "linguz-shopping-user";

        const userSelect = document.getElementById("userSelect");
        const inputProduct = document.getElementById("inputProduct");
        const inputCategory = document.getElementById("inputCategory");
        const inputTarget = document.getElementById("inputTarget");
        const btnAdd = document.getElementById("btnAdd");
        const btnAddUser = document.getElementById("btnAddUser");
        const btnVoice = document.getElementById("btnVoice");
        const btnSuper = document.getElementById("btnSuper");
        const btnClear = document.getElementById("btnClear");
        const privateTitle = document.getElementById("privateTitle");
        const privateListEl = document.getElementById("privateList");
        const commonListEl = document.getElementById("commonList");

        const modalCreateUser = document.getElementById("modalCreateUser");
        const modalUserName = document.getElementById("modalUserName");
        const modalUserEmail = document.getElementById("modalUserEmail");
        const modalUserPin = document.getElementById("modalUserPin");
        const modalBtnCreate = document.getElementById("modalBtnCreate");
        const modalBtnCancel = document.getElementById("modalBtnCancel");

        let users = [];
        let supermarketMode = false;
        let currentUserId = localStorage.getItem(STORAGE_USER_KEY) || "";

        let privateListId = "";
        let commonListId = "";
        let privateItems = [];
        let commonItems = [];

        function uid(prefix) {
            return prefix + "-" + Date.now() + "-" + Math.floor(Math.random() * 10000);
        }

        function isTrue(value) {
            return String(value).toLowerCase() === "true";
        }

        async function apiGet(action, params = {}) {
            const query = new URLSearchParams({ action, ...params }).toString();
            const response = await fetch(APPS_SCRIPT_URL + "?" + query, { method: "GET" });
            if (!response.ok) throw new Error("Error HTTP " + response.status);
            return response.json();
        }

        async function apiPost(payload) {
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const text = await response.text();
                    console.error("Error HTTP", response.status, text);
                    throw new Error("Error HTTP " + response.status + ": " + text.substring(0, 200));
                }

                try {
                    return await response.json();
                } catch (parseError) {
                    const text = await response.text();
                    console.error("JSON parse error. Response:", text);
                    throw new Error("Respuesta inválida del servidor: " + text.substring(0, 100));
                }
            } catch (networkError) {
                console.error("Fetch error:", networkError);
                throw new Error("Error de conexión: " + networkError.message);
            }
        }

        function getUserName(userId) {
            const user = users.find((u) => u.id === userId);
            return user ? user.name : "Usuario";
        }

        function sortForMarket(items) {
            return [...items].sort((a, b) => Number(a.bought) - Number(b.bought));
        }

        function groupByCategory(items) {
            const groups = {};
            CATEGORIES.forEach((cat) => { groups[cat] = []; });

            items.forEach((item) => {
                const category = CATEGORIES.includes(item.category) ? item.category : "Otros";
                groups[category].push(item);
            });

            return groups;
        }

        function mapApiItem(item) {
            return {
                id: String(item.item_id || ""),
                name: String(item.nombre_producto || ""),
                category: String(item.categoria || "Otros"),
                bought: isTrue(item.comprado),
                raw: item
            };
        }

        function renderList(items, listType) {
            const grouped = groupByCategory(sortForMarket(items));
            const root = listType === "private" ? privateListEl : commonListEl;
            root.innerHTML = "";

            if (!items.length) {
                root.innerHTML = '<p class="muted">Sin productos por ahora.</p>';
                return;
            }

            CATEGORIES.forEach((category) => {
                const bucket = grouped[category] || [];
                if (!bucket.length) return;

                const title = document.createElement("div");
                title.className = "group-title";
                title.textContent = category;
                root.appendChild(title);

                const itemsWrap = document.createElement("div");
                itemsWrap.className = "items";

                bucket.forEach((item) => {
                    const row = document.createElement("div");
                    row.className = "item" + (item.bought ? " is-bought" : "");

                    const info = document.createElement("div");
                    const name = document.createElement("div");
                    name.className = "item-name";
                    name.textContent = item.name;

                    const meta = document.createElement("div");
                    meta.className = "item-meta";
                    meta.textContent = item.bought ? "Comprado" : "Pendiente";

                    info.appendChild(name);
                    info.appendChild(meta);

                    const actions = document.createElement("div");
                    actions.className = "item-actions";

                    const checkWrap = document.createElement("label");
                    checkWrap.className = "check-wrap" + (!supermarketMode ? " disabled" : "");

                    const toggleCheckbox = document.createElement("input");
                    toggleCheckbox.type = "checkbox";
                    toggleCheckbox.checked = item.bought;
                    toggleCheckbox.disabled = !supermarketMode;
                    toggleCheckbox.title = supermarketMode
                        ? "Marcar como comprado"
                        : "Activa Modo Supermercado para marcar";
                    toggleCheckbox.addEventListener("change", () => toggleBought(listType, item.id, item.bought));

                    const checkText = document.createElement("span");
                    checkText.textContent = "Comprado";

                    checkWrap.appendChild(toggleCheckbox);
                    checkWrap.appendChild(checkText);

                    const copyBtn = document.createElement("button");
                    copyBtn.className = "btn-ghost";
                    copyBtn.textContent = listType === "private" ? "Copiar a común" : "Copiar a personal";
                    copyBtn.addEventListener("click", () => copyItem(listType, item.id));

                    const moveBtn = document.createElement("button");
                    moveBtn.className = "btn-ghost";
                    moveBtn.textContent = listType === "private" ? "Mover a común" : "Mover a personal";
                    moveBtn.addEventListener("click", () => moveItem(listType, item.id));

                    const delBtn = document.createElement("button");
                    delBtn.className = "btn-ghost";
                    delBtn.textContent = "Eliminar";
                    delBtn.addEventListener("click", () => deleteItem(item.id));

                    actions.appendChild(checkWrap);
                    actions.appendChild(copyBtn);
                    actions.appendChild(moveBtn);
                    actions.appendChild(delBtn);

                    row.appendChild(info);
                    row.appendChild(actions);
                    itemsWrap.appendChild(row);
                });

                root.appendChild(itemsWrap);
            });
        }

        function renderAll() {
            privateTitle.textContent = "Lista personal de " + getUserName(currentUserId);
            renderList(privateItems, "private");
            renderList(commonItems, "common");
            btnSuper.textContent = "Modo Supermercado: " + (supermarketMode ? "ON" : "OFF");
        }

        async function loadUsersFromApi() {
            const response = await apiGet("usuariosHogar", { hogar_id: DEFAULT_HOGAR_ID });
            if (!response.ok || !Array.isArray(response.data) || !response.data.length) {
                throw new Error("No se han encontrado usuarios activos en la hoja Usuarios.");
            }

            users = response.data.map((u) => ({
                id: String(u.user_id),
                name: String(u.nombre_visible || u.user_id)
            }));

            if (!users.some((u) => u.id === currentUserId)) {
                currentUserId = users[0].id;
                localStorage.setItem(STORAGE_USER_KEY, currentUserId);
            }

            userSelect.innerHTML = "";
            users.forEach((user) => {
                const option = document.createElement("option");
                option.value = user.id;
                option.textContent = user.name;
                userSelect.appendChild(option);
            });
            userSelect.value = currentUserId;
        }

        function setupCategorySelector() {
            inputCategory.innerHTML = "";
            CATEGORIES.forEach((category) => {
                const option = document.createElement("option");
                option.value = category;
                option.textContent = category;
                inputCategory.appendChild(option);
            });
            inputCategory.value = "Despensa";
        }

        async function refreshListsAndItems() {
            const listsResponse = await apiGet("listasUsuario", { user_id: currentUserId });
            if (!listsResponse.ok || !Array.isArray(listsResponse.data)) {
                throw new Error("No se pudieron cargar las listas del usuario.");
            }

            const lists = listsResponse.data;
            const privateList = lists.find((l) => l.tipo_lista === "privada" && l.owner_user_id === currentUserId);
            const commonList = lists.find((l) => l.tipo_lista === "comun");

            privateListId = privateList ? String(privateList.lista_id) : "";
            commonListId = commonList ? String(commonList.lista_id) : "";

            const [privateResponse, commonResponse] = await Promise.all([
                privateListId ? apiGet("itemsLista", { lista_id: privateListId }) : Promise.resolve({ ok: true, data: [] }),
                commonListId ? apiGet("itemsLista", { lista_id: commonListId }) : Promise.resolve({ ok: true, data: [] })
            ]);

            privateItems = (privateResponse.data || []).map(mapApiItem);
            commonItems = (commonResponse.data || []).map(mapApiItem);
            renderAll();
        }

        async function addItem() {
            const name = inputProduct.value.trim();
            if (!name) return;

            const targetListId = inputTarget.value === "private" ? privateListId : commonListId;
            if (!targetListId) {
                window.alert("No existe esa lista en la hoja Listas para el usuario seleccionado.");
                return;
            }

            const nowIso = new Date().toISOString();
            const payload = {
                action: "addItem",
                item: {
                    item_id: uid("item"),
                    lista_id: targetListId,
                    nombre_producto: name,
                    categoria: inputCategory.value,
                    cantidad: "",
                    unidad: "",
                    comprado: "false",
                    comprado_en: "",
                    comprado_por_user_id: "",
                    orden_supermercado: "",
                    notas: "",
                    creado_por_user_id: currentUserId,
                    creado_en: nowIso,
                    actualizado_en: nowIso,
                    eliminado: "false"
                }
            };

            const response = await apiPost(payload);
            if (!response.ok) {
                window.alert(response.error || "No se pudo añadir el producto.");
                return;
            }

            inputProduct.value = "";
            inputProduct.focus();
            await refreshListsAndItems();
        }

        async function toggleBought(listType, itemId, currentValue) {
            if (!supermarketMode) return;

            const response = await apiPost({
                action: "setItemComprado",
                item_id: itemId,
                comprado: !currentValue,
                user_id: currentUserId
            });

            if (!response.ok) {
                window.alert(response.error || "No se pudo actualizar el estado del producto.");
                return;
            }

            await refreshListsAndItems();
        }

        function findItemInUi(listType, itemId) {
            const source = listType === "private" ? privateItems : commonItems;
            return source.find((item) => item.id === itemId) || null;
        }

        async function copyItem(fromType, itemId) {
            const item = findItemInUi(fromType, itemId);
            if (!item) return;

            const targetListId = fromType === "private" ? commonListId : privateListId;
            if (!targetListId) {
                window.alert("La lista de destino no existe para este usuario.");
                return;
            }

            const nowIso = new Date().toISOString();
            const response = await apiPost({
                action: "addItem",
                item: {
                    item_id: uid("item"),
                    lista_id: targetListId,
                    nombre_producto: item.name,
                    categoria: item.category,
                    cantidad: "",
                    unidad: "",
                    comprado: "false",
                    comprado_en: "",
                    comprado_por_user_id: "",
                    orden_supermercado: "",
                    notas: "",
                    creado_por_user_id: currentUserId,
                    creado_en: nowIso,
                    actualizado_en: nowIso,
                    eliminado: "false"
                }
            });

            if (!response.ok) {
                window.alert(response.error || "No se pudo copiar el producto.");
                return;
            }

            await refreshListsAndItems();
        }

        async function moveItem(fromType, itemId) {
            await copyItem(fromType, itemId);
            await deleteItem(itemId);
        }

        async function deleteItem(itemId) {
            const response = await apiPost({
                action: "deleteItem",
                item_id: itemId,
                user_id: currentUserId
            });

            if (!response.ok) {
                window.alert(response.error || "No se pudo eliminar el producto.");
                return;
            }

            await refreshListsAndItems();
        }

        async function clearShopping() {
            if (!window.confirm("Se vaciará tu lista personal y la lista común. ¿Continuar?")) return;

            const allIds = [...privateItems, ...commonItems].map((item) => item.id);
            for (const itemId of allIds) {
                await apiPost({
                    action: "deleteItem",
                    item_id: itemId,
                    user_id: currentUserId
                });
            }

            await refreshListsAndItems();
        }

        function startVoiceInput() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                window.alert("Tu navegador no soporta reconocimiento de voz en esta versión.");
                return;
            }

            const recognition = new SR();
            recognition.lang = "es-ES";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript || "";
                inputProduct.value = transcript.trim();
                inputProduct.focus();
            };

            recognition.onerror = () => {
                window.alert("No se pudo capturar la voz. Intenta de nuevo.");
            };

            recognition.start();
        }

        function addUser() {
            modalUserName.value = "";
            modalUserEmail.value = "";
            modalUserPin.value = "";
            modalUserName.focus();
            modalCreateUser.classList.add("active");
        }

        function closeModal() {
            modalCreateUser.classList.remove("active");
        }

        async function createUserFromModal() {
            const name = modalUserName.value.trim();
            const email = modalUserEmail.value.trim();
            const pin = modalUserPin.value.trim();

            if (!name) {
                window.alert("Por favor ingresa tu nombre.");
                return;
            }

            if (pin && !/^\d{6}$/.test(pin)) {
                window.alert("El PIN debe tener exactamente 6 dígitos (ej: 123456).");
                return;
            }

            const pinHash = pin ? hashPin(pin) : "default-hash-" + Date.now();

            try {
                const response = await apiPost({
                    action: "createUsuario",
                    hogar_id: DEFAULT_HOGAR_ID,
                    nombre_visible: name,
                    email: email,
                    pin_hash: pinHash
                });

                if (!response.ok) {
                    window.alert(response.error || "No se pudo crear el usuario.");
                    return;
                }

                closeModal();
                currentUserId = response.user_id;
                localStorage.setItem(STORAGE_USER_KEY, currentUserId);
                await loadUsersFromApi();
                await refreshListsAndItems();
            } catch (error) {
                window.alert("Error creando usuario: " + String(error));
            }
        }

        function hashPin(pin) {
            let hash = 0;
            for (let i = 0; i < pin.length; i++) {
                const char = pin.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return "pin-" + Math.abs(hash).toString(16);
        }

        modalBtnCreate.addEventListener("click", () => { createUserFromModal().catch(showFatalError); });
        modalBtnCancel.addEventListener("click", closeModal);

        userSelect.addEventListener("change", async () => {
            currentUserId = userSelect.value;
            localStorage.setItem(STORAGE_USER_KEY, currentUserId);
            await refreshListsAndItems();
        });

        btnAdd.addEventListener("click", () => { addItem().catch(showFatalError); });
        btnAddUser.addEventListener("click", addUser);
        btnVoice.addEventListener("click", startVoiceInput);
        btnClear.addEventListener("click", () => { clearShopping().catch(showFatalError); });
        btnSuper.addEventListener("click", () => {
            supermarketMode = !supermarketMode;
            renderAll();
        });

        inputProduct.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter") {
                addItem().catch(showFatalError);
            }
        });

        function showFatalError(error) {
            console.error(error);
            window.alert("Error de conexion con la API. Revisa el despliegue de Apps Script y permisos de la Web App.");
        }

        async function init() {
            setupCategorySelector();
            try {
                await loadUsersFromApi();
                if (!users.length) {
                    addUser();
                } else {
                    await refreshListsAndItems();
                }
            } catch (error) {
                console.error(error);
                window.alert("No hay usuarios en el hogar. Crea uno para continuar.");
                addUser();
            }
        }

        init().catch(showFatalError);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Mi Lista de la Compra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px 16px 28px;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        header h1 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 10px 22px;
            background: rgba(255,255,255,0.25);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            backdrop-filter: blur(4px);
        }
        .btn-back:hover { background: rgba(255,255,255,0.4); transform: scale(1.04); }
        .app {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px 14px 20px;
        }
        .toolbar {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .row-full {
            display: flex;
            width: 100%;
        }
        .user-line {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 8px;
            align-items: center;
            width: 100%;
        }
        .product-line {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            width: 100%;
        }
        .product-line select {
            min-width: 125px;
        }
        .add-line {
            display: grid;
            grid-template-columns: 65% 35%;
            gap: 8px;
            width: 100%;
        }
        .add-line select,
        .add-line button {
            width: 100%;
        }
        .user-line label {
            margin-right: 2px;
        }
        .user-line select {
            width: 100%;
            min-width: 0;
        }
        label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #2e5b4a;
        }
        select,
        input,
        button {
            font-family: 'Nunito', sans-serif;
        }
        select,
        input {
            border: 1px solid #b7d6c1;
            border-radius: 10px;
            padding: 9px 10px;
            font-size: 0.92rem;
            background: #fff;
            color: #1f3d32;
        }
        .input-product {
            flex: 1;
            min-width: 150px;
        }
        .btn {
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.86rem;
            font-weight: 800;
            cursor: pointer;
            color: #fff;
        }
        .btn-full {
            width: 100%;
            min-height: 42px;
        }
        .btn-primary { background: linear-gradient(135deg, #34a853, #2f80ed); }
        .btn-secondary { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .btn-danger { background: linear-gradient(135deg, #ef5350, #e53935); }
        .btn-icon {
            width: 42px;
            height: 42px;
            padding: 0;
            border-radius: 12px;
            font-size: 1.22rem;
            line-height: 1;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #26a69a, #00897b);
        }
        .btn-ghost {
            color: #1f3d32;
            border: 1px solid #b7d6c1;
            background: #fff;
            padding: 7px 9px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
        }
        .clear-btn-wrap {
            display: flex;
            justify-content: center;
            margin-top: -4px;
        }
        .btn-clear-list {
            width: min(560px, 95%);
            padding: 12px 14px;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border: 0;
            color: #fff;
            font-size: 0.87rem;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, #f44336, #d32f2f);
            box-shadow: 0 8px 18px rgba(211, 47, 47, 0.28);
        }
        .lists {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .list-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.07);
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .list-header h2 {
            font-size: 1rem;
            color: #1f3d32;
            font-weight: 800;
        }
        .pill {
            font-size: 0.72rem;
            font-weight: 800;
            color: #fff;
            border-radius: 999px;
            padding: 4px 9px;
        }
        .pill.private { background: #43a047; }
        .pill.common { background: #1e88e5; }
        .group-title {
            margin-top: 10px;
            margin-bottom: 6px;
            font-size: 0.82rem;
            color: #49685b;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .items {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            background: #f8fbf9;
            border: 1px solid #d9e9df;
            border-radius: 10px;
            padding: 8px;
        }
        .item-name {
            font-size: 0.94rem;
            color: #203a31;
            font-weight: 700;
        }
        .item-meta {
            font-size: 0.76rem;
            color: #5f7a70;
            margin-top: 2px;
        }
        .item-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
        }
        .check-wrap {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #2a4a3d;
            background: #fff;
            border: 1px solid #b7d6c1;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            user-select: none;
        }
        .check-wrap input {
            width: 15px;
            height: 15px;
            accent-color: #2f80ed;
            cursor: pointer;
        }
        .check-wrap.disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .item.is-bought .item-name {
            text-decoration: line-through;
            opacity: 0.62;
        }
        .muted {
            font-size: 0.82rem;
            color: #607d73;
            text-align: center;
            padding: 8px 0;
        }
        .lists {
            margin-top: 4px;
        }
        @media (min-width: 900px) {
            .lists { grid-template-columns: 1fr 1fr; }
        }
        header { background: linear-gradient(135deg, #66bb6a, #42a5f5); }
    </style>
</head>
<body>
    <header>
        <h1>🛒 MI LISTA DE LA COMPRA</h1>
        <a class="btn-back" href="../index.html">🏠 Volver al inicio</a>
    </header>
    <main class="app">
        <section class="toolbar panel">
            <div class="user-line">
                <label for="userSelect">Usuario activo:</label>
                <select id="userSelect" aria-label="Seleccionar usuario"></select>
                <button id="btnAddUser" class="btn btn-icon" type="button" aria-label="Añadir usuario" title="Añadir usuario">+</button>
            </div>
            <div class="row-full">
                <button id="btnSuper" class="btn btn-secondary btn-full" type="button">Modo Supermercado: OFF</button>
            </div>
            <div class="product-line">
                <input id="inputProduct" class="input-product" type="text" placeholder="Añadir producto (ej: Leche)" aria-label="Nombre del producto">
                <select id="inputCategory" aria-label="Categoría del producto"></select>
            </div>
            <div class="add-line">
                <select id="inputTarget" aria-label="Destino del producto">
                    <option value="private">Lista personal</option>
                    <option value="common">Lista común</option>
                </select>
                <button id="btnAdd" class="btn btn-primary" type="button">Añadir</button>
            </div>
            <div class="row-full">
                <button id="btnVoice" class="btn btn-primary btn-full" type="button">Añadir un Producto por Voz</button>
            </div>
        </section>

        <div class="clear-btn-wrap">
            <button id="btnClear" class="btn-clear-list" type="button">LIMPIAR LISTA DE LA COMPRA</button>
        </div>

        <section class="lists">
            <article class="list-card">
                <div class="list-header">
                    <h2 id="privateTitle">Lista personal</h2>
                    <span class="pill private">PRIVADA</span>
                </div>
                <div id="privateList"></div>
            </article>

            <article class="list-card">
                <div class="list-header">
                    <h2>Lista común de la casa</h2>
                    <span class="pill common">COMÚN</span>
                </div>
                <div id="commonList"></div>
            </article>
        </section>
    </main>

    <script>
        const CATEGORIES = [
            "Frutería",
            "Verdulería",
            "Carnicería",
            "Pescadería",
            "Lácteos",
            "Cafés e infufiones",
            "Panadería",
            "Despensa",
            "Congelados",
            "Bebidas",
            "Snack",
            "Limpieza",
            "Higiene",
            "Otros"
        ];

        const DEFAULT_USERS = [
            { id: "linguz-mama", name: "Mamá" },
            { id: "linguz-papa", name: "Papá" },
            { id: "linguz-hija", name: "Hija" },
            { id: "linguz-hijo", name: "Hijo" }
        ];

        const STORAGE_USERS_KEY = "linguz-shopping-users";
        const STORAGE_USER_KEY = "linguz-shopping-user";
        const STORAGE_PRIVATE_PREFIX = "linguz-shopping-private-";
        const STORAGE_COMMON_KEY = "linguz-shopping-common";

        const userSelect = document.getElementById("userSelect");
        const inputProduct = document.getElementById("inputProduct");
        const inputCategory = document.getElementById("inputCategory");
        const inputTarget = document.getElementById("inputTarget");
        const btnAdd = document.getElementById("btnAdd");
        const btnAddUser = document.getElementById("btnAddUser");
        const btnVoice = document.getElementById("btnVoice");
        const btnSuper = document.getElementById("btnSuper");
        const btnClear = document.getElementById("btnClear");
        const privateTitle = document.getElementById("privateTitle");
        const privateListEl = document.getElementById("privateList");
        const commonListEl = document.getElementById("commonList");

        let users = loadUsers();
        let supermarketMode = false;
        let currentUserId = localStorage.getItem(STORAGE_USER_KEY) || users[0].id;

        function uid() {
            return "id-" + Date.now() + "-" + Math.floor(Math.random() * 10000);
        }

        function slugifyName(name) {
            return name
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "")
                .slice(0, 24);
        }

        function loadUsers() {
            const raw = localStorage.getItem(STORAGE_USERS_KEY);
            if (!raw) return [...DEFAULT_USERS];
            try {
                const parsed = JSON.parse(raw);
                if (!Array.isArray(parsed) || !parsed.length) return [...DEFAULT_USERS];
                return parsed.filter((u) => u && u.id && u.name);
            } catch {
                return [...DEFAULT_USERS];
            }
        }

        function saveUsers() {
            localStorage.setItem(STORAGE_USERS_KEY, JSON.stringify(users));
        }

        function getUserName(userId) {
            const user = users.find((u) => u.id === userId);
            return user ? user.name : "Usuario";
        }

        function addUser() {
            const name = (window.prompt("Nombre del nuevo usuario:") || "").trim();
            if (!name) return;

            const baseId = "linguz-" + slugifyName(name);
            if (!baseId || baseId === "linguz-") {
                window.alert("Nombre no válido.");
                return;
            }

            const duplicateName = users.some((u) => u.name.toLowerCase() === name.toLowerCase());
            if (duplicateName) {
                window.alert("Ese usuario ya existe.");
                return;
            }

            let finalId = baseId;
            let suffix = 2;
            while (users.some((u) => u.id === finalId)) {
                finalId = baseId + "-" + suffix;
                suffix += 1;
            }

            users.push({ id: finalId, name });
            saveUsers();
            currentUserId = finalId;
            localStorage.setItem(STORAGE_USER_KEY, currentUserId);
            setupSelectors();
            renderAll();
        }

        function loadList(key) {
            const raw = localStorage.getItem(key);
            if (!raw) return [];
            try {
                const parsed = JSON.parse(raw);
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveList(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        function getPrivateKey(userId) {
            return STORAGE_PRIVATE_PREFIX + userId;
        }

        function getPrivateList() {
            return loadList(getPrivateKey(currentUserId));
        }

        function setPrivateList(data) {
            saveList(getPrivateKey(currentUserId), data);
        }

        function getCommonList() {
            return loadList(STORAGE_COMMON_KEY);
        }

        function setCommonList(data) {
            saveList(STORAGE_COMMON_KEY, data);
        }

        function sortForMarket(items) {
            return [...items].sort((a, b) => Number(a.bought) - Number(b.bought));
        }

        function groupByCategory(items) {
            const groups = {};
            CATEGORIES.forEach((cat) => { groups[cat] = []; });

            items.forEach((item) => {
                const category = CATEGORIES.includes(item.category) ? item.category : "Despensa";
                if (!groups[category]) groups[category] = [];
                groups[category].push(item);
            });

            return groups;
        }

        function renderList(items, listType) {
            const grouped = groupByCategory(sortForMarket(items));
            const root = listType === "private" ? privateListEl : commonListEl;
            root.innerHTML = "";

            const hasAny = items.length > 0;
            if (!hasAny) {
                root.innerHTML = '<p class="muted">Sin productos por ahora.</p>';
                return;
            }

            CATEGORIES.forEach((category) => {
                const bucket = grouped[category] || [];
                if (!bucket.length) return;

                const title = document.createElement("div");
                title.className = "group-title";
                title.textContent = category;
                root.appendChild(title);

                const itemsWrap = document.createElement("div");
                itemsWrap.className = "items";

                bucket.forEach((item) => {
                    const row = document.createElement("div");
                    row.className = "item" + (item.bought ? " is-bought" : "");

                    const info = document.createElement("div");
                    const name = document.createElement("div");
                    name.className = "item-name";
                    name.textContent = item.name;

                    const meta = document.createElement("div");
                    meta.className = "item-meta";
                    meta.textContent = item.bought ? "Comprado" : "Pendiente";

                    info.appendChild(name);
                    info.appendChild(meta);

                    const actions = document.createElement("div");
                    actions.className = "item-actions";

                    const checkWrap = document.createElement("label");
                    checkWrap.className = "check-wrap" + (!supermarketMode ? " disabled" : "");

                    const toggleCheckbox = document.createElement("input");
                    toggleCheckbox.type = "checkbox";
                    toggleCheckbox.checked = Boolean(item.bought);
                    toggleCheckbox.disabled = !supermarketMode;
                    toggleCheckbox.title = supermarketMode
                        ? "Marcar como comprado"
                        : "Activa Modo Supermercado para marcar";
                    toggleCheckbox.addEventListener("change", () => toggleBought(listType, item.id));

                    const checkText = document.createElement("span");
                    checkText.textContent = "Comprado";

                    checkWrap.appendChild(toggleCheckbox);
                    checkWrap.appendChild(checkText);

                    const copyBtn = document.createElement("button");
                    copyBtn.className = "btn-ghost";
                    copyBtn.textContent = listType === "private" ? "Copiar a común" : "Copiar a personal";
                    copyBtn.addEventListener("click", () => copyItem(listType, item.id));

                    const moveBtn = document.createElement("button");
                    moveBtn.className = "btn-ghost";
                    moveBtn.textContent = listType === "private" ? "Mover a común" : "Mover a personal";
                    moveBtn.addEventListener("click", () => moveItem(listType, item.id));

                    const delBtn = document.createElement("button");
                    delBtn.className = "btn-ghost";
                    delBtn.textContent = "Eliminar";
                    delBtn.addEventListener("click", () => deleteItem(listType, item.id));

                    actions.appendChild(checkWrap);
                    actions.appendChild(copyBtn);
                    actions.appendChild(moveBtn);
                    actions.appendChild(delBtn);

                    row.appendChild(info);
                    row.appendChild(actions);
                    itemsWrap.appendChild(row);
                });

                root.appendChild(itemsWrap);
            });
        }

        function renderAll() {
            privateTitle.textContent = "Lista personal de " + getUserName(currentUserId);
            renderList(getPrivateList(), "private");
            renderList(getCommonList(), "common");
            btnSuper.textContent = "Modo Supermercado: " + (supermarketMode ? "ON" : "OFF");
        }

        function addItem() {
            const name = inputProduct.value.trim();
            if (!name) return;

            const newItem = {
                id: uid(),
                name,
                category: inputCategory.value,
                bought: false,
                createdAt: Date.now()
            };

            if (inputTarget.value === "private") {
                const list = getPrivateList();
                list.push(newItem);
                setPrivateList(list);
            } else {
                const list = getCommonList();
                list.push(newItem);
                setCommonList(list);
            }

            inputProduct.value = "";
            inputProduct.focus();
            renderAll();
        }

        function toggleBought(listType, itemId) {
            if (!supermarketMode) return;

            const getList = listType === "private" ? getPrivateList : getCommonList;
            const setList = listType === "private" ? setPrivateList : setCommonList;

            const list = getList();
            const updated = list.map((item) => {
                if (item.id !== itemId) return item;
                return { ...item, bought: !item.bought };
            });

            setList(updated);
            renderAll();
        }

        function copyItem(fromType, itemId) {
            const fromList = fromType === "private" ? getPrivateList() : getCommonList();
            const item = fromList.find((x) => x.id === itemId);
            if (!item) return;

            const targetType = fromType === "private" ? "common" : "private";
            const targetList = targetType === "private" ? getPrivateList() : getCommonList();
            targetList.push({ ...item, id: uid(), bought: false, createdAt: Date.now() });

            if (targetType === "private") setPrivateList(targetList);
            else setCommonList(targetList);

            renderAll();
        }

        function moveItem(fromType, itemId) {
            const fromList = fromType === "private" ? getPrivateList() : getCommonList();
            const index = fromList.findIndex((x) => x.id === itemId);
            if (index < 0) return;

            const [item] = fromList.splice(index, 1);
            if (fromType === "private") setPrivateList(fromList);
            else setCommonList(fromList);

            const targetType = fromType === "private" ? "common" : "private";
            const targetList = targetType === "private" ? getPrivateList() : getCommonList();
            targetList.push({ ...item, bought: false });

            if (targetType === "private") setPrivateList(targetList);
            else setCommonList(targetList);

            renderAll();
        }

        function deleteItem(listType, itemId) {
            const list = listType === "private" ? getPrivateList() : getCommonList();
            const updated = list.filter((item) => item.id !== itemId);

            if (listType === "private") setPrivateList(updated);
            else setCommonList(updated);

            renderAll();
        }

        function clearShopping() {
            const confirmText = "Se vaciará tu lista personal y la lista común. ¿Continuar?";
            if (!window.confirm(confirmText)) return;

            setPrivateList([]);
            setCommonList([]);
            renderAll();
        }

        function startVoiceInput() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) {
                window.alert("Tu navegador no soporta reconocimiento de voz en esta versión.");
                return;
            }

            const recognition = new SR();
            recognition.lang = "es-ES";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript || "";
                inputProduct.value = transcript.trim();
                inputProduct.focus();
            };

            recognition.onerror = () => {
                window.alert("No se pudo capturar la voz. Intenta de nuevo.");
            };

            recognition.start();
        }

        function setupSelectors() {
            userSelect.innerHTML = "";
            users.forEach((user) => {
                const option = document.createElement("option");
                option.value = user.id;
                option.textContent = user.name;
                userSelect.appendChild(option);
            });

            if (!users.some((u) => u.id === currentUserId)) {
                currentUserId = users[0].id;
                localStorage.setItem(STORAGE_USER_KEY, currentUserId);
            }
            userSelect.value = currentUserId;

            inputCategory.innerHTML = "";
            CATEGORIES.forEach((category) => {
                const option = document.createElement("option");
                option.value = category;
                option.textContent = category;
                inputCategory.appendChild(option);
            });
            inputCategory.value = "Despensa";
        }

        userSelect.addEventListener("change", () => {
            currentUserId = userSelect.value;
            localStorage.setItem(STORAGE_USER_KEY, currentUserId);
            renderAll();
        });

        btnAdd.addEventListener("click", addItem);
        btnAddUser.addEventListener("click", addUser);
        btnVoice.addEventListener("click", startVoiceInput);
        btnClear.addEventListener("click", clearShopping);
        btnSuper.addEventListener("click", () => {
            supermarketMode = !supermarketMode;
            renderAll();
        });

        inputProduct.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter") addItem();
        });

        setupSelectors();
        renderAll();
    </script>
</body>
</html>

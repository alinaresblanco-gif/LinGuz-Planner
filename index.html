<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>LinGuz Planner</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f2f6fa;
            overflow: hidden;
        }

        .index-screen {
            position: relative;
            width: calc(100vw - 30px);
            max-width: 430px;
            height: 100vh;
            background: url('./imagenes/fondo-index.png') no-repeat center center;
            background-size: 100% 100%;
        }

        .interactive-zone {
            position: absolute;
            border: 0;
            cursor: pointer;
            z-index: 5;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        .zone1,
        .zone2,
        .zone3,
        .zone4 {
            bottom: 2.8%;
            width: 20%;
            height: 10%;
        }

        .zone1 { left: 5%; }
        .zone2 { left: 28.5%; }
        .zone3 { left: 52%; }
        .zone4 { left: 75.5%; }
    </style>
</head>
<body>
    <main class="index-screen">
        <a class="interactive-zone zone1" href="./vistas/mi-lista.html" aria-label="Ir a Mi lista"></a>
        <a class="interactive-zone zone2" href="./vistas/nuestras-recetas.html" aria-label="Ir a Nuestras recetas"></a>
        <a class="interactive-zone zone3" href="./vistas/nuestra-agenda.html" aria-label="Ir a Nuestra agenda"></a>
        <a class="interactive-zone zone4" href="./vistas/mi-menu.html" aria-label="Ir a Mi menú"></a>
    </main>
</body>
</html>

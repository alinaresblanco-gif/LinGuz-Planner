<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#f2f6fa">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./imagenes/logo_linguz.png">
    <link rel="apple-touch-icon" href="./imagenes/logo_linguz.png">
    <title>LinGuz Planner</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(
                180deg,
                rgba(236, 228, 214, 0.75) 0%,
                rgba(224, 210, 191, 0.75) 48%,
                rgba(204, 184, 160, 0.75) 100%
            );
            overflow: hidden;
        }

        .index-screen {
            position: relative;
            width: 100vw;
            max-width: 100vw;
            height: 100vh;
            background: url('./imagenes/fondo-index-12.png') no-repeat center top;
            background-size: 100% 97%;
            overflow: hidden;
        }

        .index-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background:
                linear-gradient(
                    to bottom,
                    rgba(232, 223, 208, 0.72) 0%,
                    rgba(232, 223, 208, 0) 14%,
                    rgba(232, 223, 208, 0) 86%,
                    rgba(232, 223, 208, 0.72) 100%
                ),
                linear-gradient(
                    to right,
                    rgba(232, 223, 208, 0.4) 0%,
                    rgba(232, 223, 208, 0) 10%,
                    rgba(232, 223, 208, 0) 90%,
                    rgba(232, 223, 208, 0.4) 100%
                );
        }

        .interactive-zone {
            position: absolute;
            border: 0;
            cursor: pointer;
            z-index: 5;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        .zone1,
        .zone2,
        .zone3,
        .zone4 {
            bottom: 2.8%;
            width: 20%;
            height: 10%;
        }

        .zone1 { left: 5%; }
        .zone2 { left: 28.5%; }
        .zone3 { left: 52%; }
        .zone4 { left: 75.5%; }

    </style>
</head>
<body>
    <main class="index-screen">
        <a class="interactive-zone zone1" data-zone="zone1" href="./vistas/mi-lista.html" aria-label="Ir a Mi lista"></a>
        <a class="interactive-zone zone2" data-zone="zone2" href="./vistas/nuestras-recetas.html" aria-label="Ir a Nuestras recetas"></a>
        <a class="interactive-zone zone3" data-zone="zone3" href="./vistas/nuestra-agenda.html" aria-label="Ir a Nuestra agenda"></a>
        <a class="interactive-zone zone4" data-zone="zone4" href="./vistas/mi-menu.html" aria-label="Ir a Mi menú"></a>
    </main>

    <script>
        const STORAGE_KEY = "linguz-zones";
        const zoneEls = [...document.querySelectorAll(".interactive-zone")];

        const defaults = {
            zone1: { left: 5, bottom: 2.8, width: 20, height: 10 },
            zone2: { left: 28.5, bottom: 2.8, width: 20, height: 10 },
            zone3: { left: 52, bottom: 2.8, width: 20, height: 10 },
            zone4: { left: 75.5, bottom: 2.8, width: 20, height: 10 }
        };

        let zones = loadZones();

        function loadZones() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return JSON.parse(JSON.stringify(defaults));

            try {
                return { ...defaults, ...JSON.parse(raw) };
            } catch {
                return JSON.parse(JSON.stringify(defaults));
            }
        }

        function saveZones() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(zones));
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function toNumber(value, fallback) {
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : fallback;
        }

        function applyZones() {
            zoneEls.forEach((el) => {
                const id = el.dataset.zone;
                const z = zones[id];
                el.style.left = z.left + "%";
                el.style.bottom = z.bottom + "%";
                el.style.width = z.width + "%";
                el.style.height = z.height + "%";
            });
        }

        zoneEls.forEach((el) => {
            const id = el.dataset.zone;
            const z = zones[id];

            if (!z) {
                zones[id] = { ...defaults[id] };
            } else {
                z.left = clamp(toNumber(z.left, defaults[id].left), 0, 95);
                z.bottom = clamp(toNumber(z.bottom, defaults[id].bottom), 0, 96);
                z.width = clamp(toNumber(z.width, defaults[id].width), 5, 95 - z.left);
                z.height = clamp(toNumber(z.height, defaults[id].height), 4, 100 - z.bottom);
            }
        });

        saveZones();

        applyZones();

        if ("serviceWorker" in navigator) {
            let reloading = false;

            const refreshRegistration = async () => {
                const registration = await navigator.serviceWorker.getRegistration("./");
                if (registration) {
                    await registration.update();
                }
            };

            navigator.serviceWorker.addEventListener("controllerchange", () => {
                if (reloading) return;
                reloading = true;
                window.location.reload();
            });

            window.addEventListener("load", async () => {
                try {
                    await navigator.serviceWorker.register("./service-worker.js", { scope: "./" });
                    await refreshRegistration();
                } catch (error) {
                    console.error("No se pudo registrar el service worker", error);
                }
            });

            window.addEventListener("pageshow", () => {
                refreshRegistration().catch(() => {});
            });

            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "visible") {
                    refreshRegistration().catch(() => {});
                }
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#f2f6fa">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./imagenes/logo_linguz.png">
    <link rel="apple-touch-icon" href="./imagenes/logo_linguz.png">
    <title>LinGuz Planner</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f2f6fa;
            overflow: hidden;
        }

        .index-screen {
            position: relative;
            width: 120vw;
            max-width: 100vw;
            height: 92vh;
            background: url('./imagenes/fondo-index-12.png') no-repeat center center;
            background-size: 100% 100%;
        }

        .controls {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(0, 0, 0, 0.12);
            font-family: Arial, sans-serif;
            font-size: 13px;
        }

        .controls button {
            border: 1px solid #8aa0b2;
            border-radius: 8px;
            background: #ffffff;
            padding: 5px 9px;
            font-size: 12px;
            cursor: pointer;
        }

        .interactive-zone {
            position: absolute;
            border: 0;
            cursor: pointer;
            z-index: 5;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        .zone1,
        .zone2,
        .zone3,
        .zone4 {
            bottom: 2.8%;
            width: 20%;
            height: 10%;
        }

        .zone1 { left: 5%; }
        .zone2 { left: 28.5%; }
        .zone3 { left: 52%; }
        .zone4 { left: 75.5%; }

        .index-screen.adjust-mode .interactive-zone {
            border: 2px dashed #ff9800;
            background: rgba(255, 193, 7, 0.2);
            touch-action: none;
        }

        .index-screen.adjust-mode .interactive-zone::after {
            content: "";
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            background: #ff9800;
            border-top-left-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <label>
            <input type="checkbox" id="editMode">
            Modo ajuste
        </label>
        <button id="resetZones" type="button">Reiniciar zonas</button>
    </div>

    <main class="index-screen">
        <a class="interactive-zone zone1" data-zone="zone1" href="./vistas/mi-lista.html" aria-label="Ir a Mi lista"></a>
        <a class="interactive-zone zone2" data-zone="zone2" href="./vistas/nuestras-recetas.html" aria-label="Ir a Nuestras recetas"></a>
        <a class="interactive-zone zone3" data-zone="zone3" href="./vistas/nuestra-agenda.html" aria-label="Ir a Nuestra agenda"></a>
        <a class="interactive-zone zone4" data-zone="zone4" href="./vistas/mi-menu.html" aria-label="Ir a Mi menú"></a>
    </main>

    <script>
        const STORAGE_KEY = "linguz-zones";
        const screenEl = document.querySelector(".index-screen");
        const editModeEl = document.getElementById("editMode");
        const resetBtn = document.getElementById("resetZones");
        const zoneEls = [...document.querySelectorAll(".interactive-zone")];

        const defaults = {
            zone1: { left: 5, bottom: 2.8, width: 20, height: 10 },
            zone2: { left: 28.5, bottom: 2.8, width: 20, height: 10 },
            zone3: { left: 52, bottom: 2.8, width: 20, height: 10 },
            zone4: { left: 75.5, bottom: 2.8, width: 20, height: 10 }
        };

        let zones = loadZones();
        let drag = null;

        function loadZones() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return JSON.parse(JSON.stringify(defaults));

            try {
                return { ...defaults, ...JSON.parse(raw) };
            } catch {
                return JSON.parse(JSON.stringify(defaults));
            }
        }

        function saveZones() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(zones));
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function applyZones() {
            zoneEls.forEach((el) => {
                const id = el.dataset.zone;
                const z = zones[id];
                el.style.left = z.left + "%";
                el.style.bottom = z.bottom + "%";
                el.style.width = z.width + "%";
                el.style.height = z.height + "%";
            });
        }

        function pointerDown(ev) {
            if (!editModeEl.checked) return;

            const target = ev.currentTarget;
            const zoneId = target.dataset.zone;
            const rect = target.getBoundingClientRect();
            const screenRect = screenEl.getBoundingClientRect();
            const nearResize =
                ev.clientX >= rect.right - 24 &&
                ev.clientY >= rect.bottom - 24;

            drag = {
                zoneId,
                pointerId: ev.pointerId,
                mode: nearResize ? "resize" : "move",
                startX: ev.clientX,
                startY: ev.clientY,
                start: { ...zones[zoneId] },
                screenWidth: screenRect.width,
                screenHeight: screenRect.height
            };

            target.setPointerCapture(ev.pointerId);
            ev.preventDefault();
        }

        function pointerMove(ev) {
            if (!drag || ev.pointerId !== drag.pointerId) return;

            const dxPx = ev.clientX - drag.startX;
            const dyPx = ev.clientY - drag.startY;
            const dxPct = (dxPx / drag.screenWidth) * 100;
            const dyPct = (dyPx / drag.screenHeight) * 100;
            const z = zones[drag.zoneId];

            if (drag.mode === "resize") {
                z.width = clamp(drag.start.width + dxPct, 5, 95 - drag.start.left);
                z.height = clamp(drag.start.height - dyPct, 4, 100 - drag.start.bottom);
            } else {
                z.left = clamp(drag.start.left + dxPct, 0, 100 - drag.start.width);
                z.bottom = clamp(drag.start.bottom - dyPct, 0, 100 - drag.start.height);
            }

            applyZones();
        }

        function pointerUp(ev) {
            if (!drag || ev.pointerId !== drag.pointerId) return;
            saveZones();
            drag = null;
        }

        editModeEl.addEventListener("change", () => {
            screenEl.classList.toggle("adjust-mode", editModeEl.checked);
        });

        resetBtn.addEventListener("click", () => {
            zones = JSON.parse(JSON.stringify(defaults));
            saveZones();
            applyZones();
        });

        zoneEls.forEach((el) => {
            el.addEventListener("click", (ev) => {
                if (editModeEl.checked) ev.preventDefault();
            });
            el.addEventListener("pointerdown", pointerDown);
            el.addEventListener("pointermove", pointerMove);
            el.addEventListener("pointerup", pointerUp);
            el.addEventListener("pointercancel", pointerUp);
        });

        applyZones();

        if ("serviceWorker" in navigator) {
            let reloading = false;

            const refreshRegistration = async () => {
                const registration = await navigator.serviceWorker.getRegistration("./");
                if (registration) {
                    await registration.update();
                }
            };

            navigator.serviceWorker.addEventListener("controllerchange", () => {
                if (reloading) return;
                reloading = true;
                window.location.reload();
            });

            window.addEventListener("load", async () => {
                try {
                    await navigator.serviceWorker.register("./service-worker.js", { scope: "./" });
                    await refreshRegistration();
                } catch (error) {
                    console.error("No se pudo registrar el service worker", error);
                }
            });

            window.addEventListener("pageshow", () => {
                refreshRegistration().catch(() => {});
            });

            document.addEventListener("visibilitychange", () => {
                if (document.visibilityState === "visible") {
                    refreshRegistration().catch(() => {});
                }
            });
        }
    </script>
</body>
</html>
